services:
  db:
    image: postgres:16
    container_name: icecream-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: local_dev_only_change_me
      POSTGRES_DB: icecream_platform
    ports:
      - "5432:5432"
    volumes:
      - icecream_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d icecream_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  icecream_pgdata:
